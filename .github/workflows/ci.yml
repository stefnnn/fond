name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruby:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec rake test

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter fond build
      - run: pnpm --filter fond test

  example:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/orders
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: examples/orders
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: bin/rails db:prepare
      - run: bin/rails test
      - name: Codegen drift check
        run: bin/rails fond:codegen:check
